<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonashVote – Results & Visualisation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #002a5c; --blue: #006dae; --accent: #00aad2;
    --light: #f4f7fb; --white: #fff; --text: #1a2233;
    --muted: #6b7a99; --border: #d6e0f0; --shadow: 0 4px 24px rgba(0,42,92,0.09);
    --c1: #002a5c; --c2: #006dae; --c3: #00aad2; --c4: #7dd3fc; --c5: #a5b4fc;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--light); min-height: 100vh; }
  nav { background: var(--navy); padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .nav-logo-mark { width: 32px; height: 32px; background: white; border-radius: 7px; display: grid; place-items: center; font-family: 'DM Serif Display', serif; color: var(--navy); font-size: 16px; }
  .nav-logo-text { color: white; font-size: 15px; font-weight: 600; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .back-btn { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; text-decoration: none; }
  .back-btn:hover { color: white; }

  .main { max-width: 1100px; margin: 0 auto; padding: 40px; }
  .page-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-start; }
  .title-area h1 { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--navy); margin-bottom: 4px; }
  .title-area p { font-size: 14px; color: var(--muted); }
  .tab-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab {
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
    background: white; color: var(--muted); transition: all 0.15s;
  }
  .tab.active { background: var(--navy); color: white; border-color: var(--navy); }
  .tab:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }

  .panel { background: white; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
  .panel-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .winner-banner { background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); padding: 18px 24px; display: flex; align-items: center; gap: 14px; }
  .winner-crown { font-size: 22px; }
  .winner-text h3 { font-family: 'DM Serif Display', serif; font-size: 18px; color: white; margin-bottom: 2px; }
  .winner-text p { font-size: 12px; color: rgba(255,255,255,0.7); }
  .result-list { padding: 16px; }
  .result-item { margin-bottom: 14px; }
  .result-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .result-name { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .result-rank { width: 20px; height: 20px; border-radius: 5px; background: var(--navy); color: white; font-size: 10px; font-weight: 700; display: grid; place-items: center; }
  .result-rank.r2 { background: var(--blue); }
  .result-rank.r3 { background: var(--accent); }
  .result-rank.r4, .result-rank.r5 { background: var(--border); color: var(--muted); }
  .result-pct { font-size: 13px; font-weight: 700; color: var(--navy); }
  .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
  .bar-fill.r1 { background: linear-gradient(90deg, var(--navy), var(--blue)); }
  .bar-fill.r2 { background: var(--blue); }
  .bar-fill.r3 { background: var(--accent); }
  .bar-fill.r4, .bar-fill.r5 { background: #b0c4d8; }
  .votes-count { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .viz-panel { display: flex; flex-direction: column; gap: 20px; }
  .trait-selector { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 20px 24px; box-shadow: var(--shadow); }
  .trait-selector h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
  .trait-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .trait-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .trait-pill.active { background: var(--navy); color: white; border-color: var(--navy); }
  .trait-pill:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

  .charts-row { display: grid; grid-template-columns: 1fr; gap: 20px; }
  .chart-panel { background: white; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); padding: 22px; min-height: 320px; }
  .chart-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .chart-wrap { position: relative; height: 280px; overflow-x: auto; }
  .chart-scroll { overflow-x: auto; padding-bottom: 8px; }
  .chart-scroll .chart-wrap { min-width: 400px; }

  .not-available {
    text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; line-height: 1.6;
  }
  .not-available strong { color: var(--navy); }
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <div class="nav-logo-mark">M</div>
    <span class="nav-logo-text">MonashVote</span>
  </div>
  <div class="nav-right">
    <a class="back-btn" href="dashboard.html">← Dashboard</a>
    <a class="back-btn" href="dashboard-admin.html">Management</a>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div class="title-area">
      <h1 id="resultTitle">Results &amp; Visualisation</h1>
      <p id="resultSub">Select an election to view results.</p>
    </div>
  </div>

  <div class="tab-row" id="electionTabs">
    <span style="color:var(--muted);font-size:13px;">Loading elections…</span>
  </div>

  <div id="resultContent">
    <div class="not-available">
      <strong>Select an election</strong> above to view its results.
    </div>
  </div>
</div>

<script>
  let allElections = [];
  let currentElectionId = null;
  let currentTrait = null;
  let currentResultsData = null;

  const COLOR_PALETTE = ['#002a5c','#006dae','#00aad2','#7dd3fc','#a5b4fc','#e2e8f0','#94a3b8','#475569'];

  async function loadElections() {
    try {
      const res = await fetch('/api/elections?includeEnded=true', { credentials: 'include' });
      if (!res.ok) return;
      const data = await res.json();
      allElections = data.elections || [];
      renderTabs();
    } catch {}
  }

  function renderTabs() {
    const tabsEl = document.getElementById('electionTabs');
    if (allElections.length === 0) {
      tabsEl.innerHTML = '<span style="color:var(--muted);font-size:13px;">No elections available.</span>';
      return;
    }
    tabsEl.innerHTML = allElections.map(e =>
      `<div class="tab" onclick="selectElection(${e.id})">${e.title}</div>`
    ).join('');
  }

  async function selectElection(id) {
    currentElectionId = id;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const tabs = document.querySelectorAll('.tab');
    const idx = allElections.findIndex(e => e.id === id);
    if (idx >= 0 && tabs[idx]) tabs[idx].classList.add('active');

    document.getElementById('resultContent').innerHTML =
      '<div class="not-available">Loading results…</div>';

    try {
      const res = await fetch(`/api/elections/${id}/results?preview=true`, { credentials: 'include' });
      const data = await res.json();

      if (!data.resultsAvailable && !data.isPreview) {
        document.getElementById('resultContent').innerHTML =
          `<div class="not-available">
            <strong>${data.message || 'Results not yet available.'}</strong>
            <p style="margin-top:8px;">Election ends: ${new Date(data.endsAt).toLocaleDateString()}</p>
          </div>`;
        return;
      }

      if (data.totalVotes === 0) {
        document.getElementById('resultContent').innerHTML =
          '<div class="not-available"><strong>No ballots</strong> have been cast in this election yet.</div>';
        return;
      }

      document.getElementById('resultTitle').textContent = data.electionTitle;
      const previewNote = data.isPreview ? ' · <span style="color:#f59e0b;font-size:12px;font-weight:700;">LIVE PREVIEW — election still open</span>' : '';
      document.getElementById('resultSub').innerHTML = `IRV tally · ${data.totalVotes} ballots counted${previewNote}`;

      currentResultsData = data;
      currentTrait = Object.keys(data.traitBreakdown || {})[0] || null;

      renderAll(data);
    } catch {
      document.getElementById('resultContent').innerHTML =
        '<div class="not-available">Failed to load results. Ensure backend is running.</div>';
    }
  }

  function renderAll(data) {
    const winner = data.winner;
    const tally = data.finalTally || [];
    const maxVotes = tally.length > 0 ? tally[0].votes : 1;

    let winnerHTML = '';
    if (winner) {
      winnerHTML = `
        <div class="winner-banner">
          <div class="winner-crown">👑</div>
          <div class="winner-text">
            <h3>${winner.candidateName} — Winner</h3>
            <p>Elected · ${winner.votes} first preference votes</p>
          </div>
        </div>`;
    }

    let tallyHTML = tally.map((t, i) => {
      const rankClass = ['r1','r2','r3','r4','r5'][i] || 'r5';
      const pct = data.totalVotes > 0 ? ((t.votes / data.totalVotes) * 100).toFixed(1) : '0.0';
      return `
        <div class="result-item">
          <div class="result-label">
            <span class="result-name"><span class="result-rank ${i > 0 ? rankClass : ''}">${i + 1}</span>${t.display_name}</span>
            <span class="result-pct">${pct}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${rankClass}" data-w="${(t.votes / maxVotes * 100).toFixed(0)}%"></div></div>
          <div class="votes-count">${t.votes} votes</div>
        </div>`;
    }).join('');

    // Trait selector
    let traitPillsHTML = Object.keys(data.traitBreakdown || {}).map(t =>
      `<div class="trait-pill ${t === currentTrait ? 'active' : ''}" onclick="switchTrait('${t}')">${t}</div>`
    ).join('');

    let chartsHTML = `<div class="charts-row"><div class="chart-panel"><div class="chart-title" id="chartTitle">First Preference by Trait</div><div class="chart-wrap"><canvas id="barChart"></canvas></div></div></div>`;

    document.getElementById('resultContent').innerHTML = `
      <div class="grid">
        <div>
          <div class="panel">
            ${winnerHTML}
            <div class="panel-header"><span class="panel-title">First Preferences</span></div>
            <div class="result-list">${tallyHTML}</div>
          </div>
        </div>
        <div class="viz-panel">
          <div class="trait-selector">
            <h3>Break down by voter trait</h3>
            <div class="trait-pills">${traitPillsHTML}</div>
          </div>
          ${chartsHTML}
        </div>
      </div>`;

    // Animate bars
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(b => {
        b.style.width = b.dataset.w;
      });
    }, 50);

    // Draw chart
    if (currentTrait) drawTraitChart(data);
  }

  function switchTrait(traitName) {
    currentTrait = traitName;
    document.querySelectorAll('.trait-pill').forEach(p => p.classList.remove('active'));

    // Find the matching pill and activate it
    const pills = document.querySelectorAll('.trait-pill');
    for (const pill of pills) {
      if (pill.textContent === traitName) pill.classList.add('active');
    }

    // Redraw the chart using the latest loaded results data
    drawTraitChart(currentResultsData, traitName);
  }

  let traitChart = null;

  function drawTraitChart(data, traitNameOverride) {
    if (!data && !traitNameOverride) return;
    const trait = traitNameOverride || currentTrait;
    const breakdown = data?.traitBreakdown || currentResultsData?.traitBreakdown || {};

    if (!trait || !breakdown[trait]) return;

    const traitData = breakdown[trait];
    document.getElementById('chartTitle').textContent = `First Preference by ${trait}`;

    // Collect candidates & option values
    const candidateSet = new Set();
    for (const opt of Object.keys(traitData)) {
      for (const name of Object.keys(traitData[opt])) candidateSet.add(name);
    }
    const candidates = [...candidateSet];
    const optionValues = Object.keys(traitData);

    // Build datasets: one per candidate
    const datasets = candidates.map((cand, i) => ({
      label: cand,
      data: optionValues.map(opt => traitData[opt][cand] || 0),
      backgroundColor: COLOR_PALETTE[i % COLOR_PALETTE.length],
      borderRadius: 4,
      borderSkipped: false,
      barPercentage: 0.75,
      categoryPercentage: 0.85,
    }));

    // Destroy old chart
    if (traitChart) { traitChart.destroy(); traitChart = null; }

    const canvas = document.getElementById('barChart');
    if (!canvas) return;

    // Adjust container width for many groups
    const needsScroll = optionValues.length > 5 || candidates.length > 4;
    const wrap = canvas.closest('.chart-wrap');
    if (wrap) {
      wrap.style.minWidth = needsScroll ? `${Math.max(400, optionValues.length * 70)}px` : '';
    }

    traitChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: optionValues.map(o => o.length > 14 ? o.slice(0, 13) + '…' : o),
        datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: { boxWidth: 12, font: { size: 11, family: "'DM Sans', sans-serif" }, padding: 12, usePointStyle: true }
          },
          tooltip: {
            backgroundColor: '#002a5c',
            titleFont: { size: 12, family: "'DM Sans', sans-serif" },
            bodyFont: { size: 11, family: "'DM Sans', sans-serif" },
            padding: 10,
            cornerRadius: 8,
            callbacks: {
              label: (ctx) => ` ${ctx.dataset.label}: ${ctx.parsed.y} vote${ctx.parsed.y !== 1 ? 's' : ''}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 10, family: "'DM Sans', sans-serif" }, maxRotation: 45, minRotation: 0 }
          },
          y: {
            beginAtZero: true,
            ticks: { precision: 0, font: { size: 10, family: "'DM Sans', sans-serif" } },
            grid: { color: '#edf2f7' },
            title: { display: true, text: 'First-preference votes', font: { size: 10, family: "'DM Sans', sans-serif" } }
          }
        },
        animation: { duration: 600, easing: 'easeOutQuart' }
      }
    });
  }

  // Initialize
  loadElections();
</script>
</body>
</html>
