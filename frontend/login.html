<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonashVote - Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #002a5c;
    --blue: #006dae;
    --accent: #00aad2;
    --light: #f4f7fb;
    --white: #fff;
    --text: #1a2233;
    --muted: #6b7a99;
    --border: #d6e0f0;
    --red: #dc2626;
    --shadow: 0 8px 40px rgba(0,42,92,0.12);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(0,109,174,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 10%, rgba(0,170,210,0.10) 0%, transparent 55%);
  }
  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px;
    width: min(100%, 440px);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 34px;
  }
  .logo-mark {
    width: 44px;
    height: 44px;
    background: var(--navy);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 22px;
    flex: 0 0 auto;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .alert {
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 22px;
    display: none;
    line-height: 1.5;
  }
  .alert.show { display: block; }
  .alert.is-error {
    background: rgba(220,38,38,0.08);
    color: var(--red);
    border: 1px solid rgba(220,38,38,0.2);
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 28px;
  }
  .monash-note {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: rgba(0,42,92,0.04);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    overflow-wrap: anywhere;
  }
  .monash-note strong {
    color: #56698d;
    font-weight: 700;
    white-space: nowrap;
  }
  .monash-badge {
    background: var(--navy);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    flex: 0 0 auto;
    margin-top: 1px;
  }
  .google-btn {
    width: 100%;
    min-height: 56px;
    padding: 14px 16px;
    background: white;
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .google-btn:hover:not(:disabled) {
    border-color: var(--blue);
    box-shadow: 0 4px 16px rgba(0,42,92,0.08);
  }
  .google-btn:active:not(:disabled) { transform: scale(0.98); }
  .google-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .google-mark {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: #4285f4;
    font-weight: 700;
    font-size: 16px;
    background: #fff;
    flex: 0 0 auto;
  }
  .config-note {
    display: none;
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .config-note.show { display: block; }
  .dev-login {
    display: none;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .dev-login.show { display: block; }
  .dev-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .dev-row {
    display: flex;
    gap: 8px;
  }
  .dev-row input {
    flex: 1;
    min-width: 0;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font: inherit;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }
  .dev-row input:focus { border-color: var(--blue); }
  .dev-btn {
    padding: 10px 13px;
    border: none;
    border-radius: 10px;
    background: var(--navy);
    color: white;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .dev-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  @media (max-width: 520px) {
    body { padding: 16px; }
    .card { padding: 36px 28px; border-radius: 18px; }
    h1 { font-size: 29px; }
    .monash-note { flex-direction: column; }
    .dev-row { flex-direction: column; }
  }
</style>
</head>
<body>
<main class="card">
  <div class="logo">
    <div class="logo-mark">M</div>
    <div>
      <div class="logo-text">MonashVote</div>
      <div class="logo-sub">Club Election Portal</div>
    </div>
  </div>

  <div class="alert" id="alertBox"></div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in with your Monash Google account to continue.</p>

  <div class="monash-note">
    <span class="monash-badge">MONASH</span>
    <span>Only <strong>@student.monash.edu</strong> or <strong>@monash.edu</strong> accounts are accepted.</span>
  </div>

  <button class="google-btn" id="googleBtn" onclick="handleGoogleLogin()" disabled>
    <span class="google-mark">G</span>
    <span id="googleBtnLabel">Loading Google sign-in...</span>
  </button>
  <p class="config-note" id="configNote">Google login is not configured on this server.</p>

  <div class="dev-login" id="devLoginBox">
    <label class="dev-label" for="devEmail">Development login</label>
    <div class="dev-row">
      <input id="devEmail" type="email" value="demo@student.monash.edu" autocomplete="off">
      <button class="dev-btn" id="devLoginBtn" type="button" onclick="handleDevLogin()">Dev login</button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  let supabaseClient = null;
  const supabaseConfigReady = initSupabaseAuth();

  function setDevLoginVisible(show) {
    document.getElementById('devLoginBox').classList.toggle('show', show);
  }

  function setAlert(msg, type) {
    const box = document.getElementById('alertBox');
    if (!msg) {
      box.className = 'alert';
      box.textContent = '';
      return;
    }
    box.className = `alert show is-${type}`;
    box.textContent = msg;
  }

  function setGoogleLoading(on) {
    const btn = document.getElementById('googleBtn');
    document.getElementById('googleBtnLabel').textContent = on ? 'Redirecting...' : 'Continue with Google';
    btn.disabled = on;
  }

  async function initSupabaseAuth() {
    const btn = document.getElementById('googleBtn');
    const note = document.getElementById('configNote');

    try {
      const res = await fetch('/api/auth/supabase-config');
      const config = await res.json();
      setDevLoginVisible(Boolean(config.devMode));

      if (!config.enabled || !window.supabase) {
        btn.disabled = true;
        document.getElementById('googleBtnLabel').textContent = 'Google sign-in unavailable';
        note.classList.add('show');
        return;
      }

      supabaseClient = window.supabase.createClient(config.url, config.anonKey, {
        auth: {
          flowType: 'implicit',
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: false
        }
      });
      btn.disabled = false;
      document.getElementById('googleBtnLabel').textContent = 'Continue with Google';
    } catch {
      btn.disabled = true;
      document.getElementById('googleBtnLabel').textContent = 'Google sign-in unavailable';
      note.classList.add('show');
    }
  }

  async function handleGoogleLogin() {
    setAlert('', '');
    setGoogleLoading(true);
    await supabaseConfigReady;

    if (!supabaseClient) {
      setAlert('Google login is not configured on this server.', 'error');
      document.getElementById('googleBtn').disabled = true;
      return;
    }

    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: `${window.location.origin}/auth-callback.html`,
        queryParams: { prompt: 'select_account' }
      }
    });

    if (error) {
      setAlert(error.message || 'Could not start Google login.', 'error');
      setGoogleLoading(false);
    }
  }

  const params = new URLSearchParams(window.location.search);
  const loginError = params.get('error');
  if (loginError) setAlert(loginError, 'error');

  (async () => {
    if (loginError) return;
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (res.ok) window.location.href = 'dashboard.html';
    } catch {}
  })();

  async function handleDevLogin() {
    setAlert('', '');
    const btn = document.getElementById('devLoginBtn');
    const email = document.getElementById('devEmail').value.trim() || 'demo@student.monash.edu';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/api/auth/dev-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email })
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Development login failed.');
      window.location.href = result.isNewUser ? 'traits.html' : 'dashboard.html';
    } catch (err) {
      setAlert(err.message || 'Development login failed.', 'error');
      btn.disabled = false;
      btn.textContent = 'Dev login';
    }
  }
</script>
</body>
</html>
